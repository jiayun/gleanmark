<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="bookmark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e8f0fe;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Bookmark ribbon shape -->
  <path d="M 160 96
           L 352 96
           Q 368 96 368 112
           L 368 400
           L 256 340
           L 144 400
           L 144 112
           Q 144 96 160 96 Z"
        fill="url(#bookmark)" />

  <!-- Magnifying glass / search circle -->
  <circle cx="272" cy="224" r="56" fill="none" stroke="#4a90d9" stroke-width="12" opacity="0.8"/>

  <!-- Magnifying glass handle -->
  <line x1="312" y1="264" x2="344" y2="296" stroke="#4a90d9" stroke-width="12" stroke-linecap="round" opacity="0.8"/>

  <!-- Three horizontal lines (text representation) inside bookmark -->
  <line x1="184" y1="160" x2="240" y2="160" stroke="#4a90d9" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <line x1="184" y1="188" x2="224" y2="188" stroke="#4a90d9" stroke-width="8" stroke-linecap="round" opacity="0.25"/>

  <!-- Sparkle dots (semantic/AI feel) -->
  <circle cx="200" cy="280" r="5" fill="#4a90d9" opacity="0.4"/>
  <circle cx="224" cy="304" r="4" fill="#4a90d9" opacity="0.3"/>
  <circle cx="192" cy="312" r="3" fill="#4a90d9" opacity="0.25"/>
</svg>
