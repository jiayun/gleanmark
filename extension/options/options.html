<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      padding: 20px;
      color: #1a1a1a;
      min-width: 400px;
    }
    h2 { font-size: 16px; margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; box-sizing: border-box; }
    input:focus { border-color: #4a90d9; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    button { margin-top: 12px; padding: 8px 16px; background: #4a90d9; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
    button:hover { background: #357abd; }
    .status { margin-top: 8px; font-size: 13px; color: #1e7e34; }
  </style>
</head>
<body>
  <h2>GleanMark Settings</h2>
  <label for="server-url">Server URL</label>
  <input type="text" id="server-url" placeholder="http://localhost:21580">
  <p class="hint">The address of your GleanMark server. Default: http://localhost:21580</p>
  <button id="save">Save</button>
  <p id="status" class="status"></p>
  <script src="options.js"></script>
</body>
</html>
