<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .field { margin-bottom: 10px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: #4a90d9; }
    textarea { resize: vertical; min-height: 60px; }
    .url-display {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #357abd; }
    button:disabled { background: #aaa; cursor: default; }
    button.success { background: #4caf50; }
    button.error { background: #e53935; }
    .status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      color: #666;
    }
    .status.error { color: #e53935; }
  </style>
</head>
<body>
  <h1>GleanMark</h1>
  <div class="url-display" id="url"></div>

  <div class="field">
    <label>Title</label>
    <input type="text" id="title" placeholder="Page title">
  </div>

  <div class="field">
    <label>Tags</label>
    <input type="text" id="tags" placeholder="rust, programming, tutorial">
  </div>

  <div class="field">
    <label>Content Preview</label>
    <textarea id="content" rows="4" placeholder="Extracted content..."></textarea>
  </div>

  <button id="save">Save Bookmark</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
